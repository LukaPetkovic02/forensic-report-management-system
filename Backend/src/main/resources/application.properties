spring.application.name=Backend

spring.datasource.url=jdbc:postgresql://localhost:5432/udd_db
spring.datasource.username=postgres
spring.datasource.password=super

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

minio.url=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucket=forensic-reports

spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=password

logging.file.name=./src/main/resources/elk-logstash/logs/app.log
logging.file.path=./src/main/resources/elk-logstash/logs
#logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - User: %X{username:-anonymous} - %msg%n
logging.level.com.example.backend=DEBUG